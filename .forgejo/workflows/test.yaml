name: Test
on:
  - push
  - pull_request

jobs:
  commit-check:
    name: Commit Check
    runs-on: ubuntu-latest
    steps:
      - name: Commit Check
        uses: https://github.com/IceflowRE/gitcc@v3.0.0
        with:
          validator: "simpletag"

      - name: Commit Check
        uses: IceflowRE/gitcc@v3.0.0
        with:
          validator_file: "test.mjs"
